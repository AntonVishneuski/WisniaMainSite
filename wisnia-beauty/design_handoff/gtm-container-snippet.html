<!--
  GOOGLE TAG MANAGER — контейнер для Wiśnia Beauty
  =================================================
  Один контейнер GTM на сайте → внутри него настраиваются ВСЕ теги:
  Meta Pixel, GA4, Google Ads, согласие на cookies. Менять теги можно
  без правок кода.

  ЧТО СДЕЛАТЬ:
  1. Контейнер GTM-TGMXPHZW уже создан и подставлен ниже.
  2. ID GTM-TGMXPHZW уже подставлен (оба блока).
  3. БЛОК 1 (head) — как можно выше в <head> каждой страницы.
     БЛОК 2 (body) — сразу после открывающего <body> каждой страницы.
     В реальном проекте — в глобальный layout/шаблон (один раз на все страницы).
  4. Опубликовать сайт + опубликовать контейнер в GTM.
  5. Проверить расширением "Tag Assistant" (Google) — контейнер виден.

  ВНУТРИ GTM настраиваются (см. вики-гайд "GTM — настройка трекинга"):
  - Meta Pixel (наш ID) + событие CTAClick (хук уже есть в main.js)
  - GA4 (Measurement ID G-XXXX)
  - Google Ads (Conversion ID/Label)
  - Consent Mode + баннер согласия (RODO/GDPR)
-->
