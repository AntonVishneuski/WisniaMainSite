version: '3'

services:
  payload:
    image: node:20-alpine
    ports:
      - '3000:3000'
    volumes:
      - .:/home/node/app
      - node_modules:/home/node/app/node_modules
    working_dir: /home/node/app/
    command: sh -c "corepack enable && corepack prepare pnpm@latest --activate && pnpm install && pnpm dev"
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      # Ensure the app connects to the containerised Postgres instance
      DATABASE_URL: postgresql://wisnia:wisnia@postgres:5432/wisnia

  # Ensure your .env DATABASE_URL matches: postgresql://wisnia:wisnia@localhost:5432/wisnia
  postgres:
    image: postgres:16
    restart: always
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: wisnia
      POSTGRES_USER: wisnia
      POSTGRES_PASSWORD: wisnia
    volumes:
      - pgdata:/var/lib/postgresql/data
    logging:
      driver: none

volumes:
  pgdata:
  node_modules:
